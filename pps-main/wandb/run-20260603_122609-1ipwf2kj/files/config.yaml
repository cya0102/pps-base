comment:
    value: parameters in paper
config_path:
    value: config/activitynet/config_exp08.json
dataset:
    value:
        feature_path: data/activitynet/sub_activitynet_v1-3.c3d.hdf5
        frame_feat_dim: 500
        max_num_segments: 200
        max_num_words: 20
        name: ActivityNet
        test_data: data/activitynet/test_data.json
        train_data: data/activitynet/train_data.json
        vocab_path: data/activitynet/glove.pkl
        vocab_size: 8000
        word_feat_dim: 300
exp_name:
    value: exp-activitynet_exp08
loss:
    value:
        alpha_inter_push: 0.1
        alpha_intra_push: 0.01
        alpha_ivc: 1
        alpha_pull: 0.2
        lambda_inter_push: 0.15
        lambda_intra_push: 0.15
        margin_eneg: 2
        margin_hneg: 0.1
        num_train_prop: 1
model:
    value:
        DualTransformer:
            d_model: 256
            dropout: 0.1
            num_decoder_layers1: 3
            num_decoder_layers2: 3
            num_heads: 4
        dropout: 0.1
        frame_feat_dim: 500
        hidden_dim: 256
        mask_type: gaussian
        masked_words_ratio: 3
        max_epoch: 30
        max_num_words: 20
        name: PPS
        neg_type: learnable_gaussian
        num_neg_mask: 2
        num_props: 5
        pred_gamma: 0.15
        sigma_gauss: 4
        sigma_laplace: 4
        sigma_neg_gauss: 3
        sigma_neg_inv_gauss: 1
        use_attn: true
        vocab_size: 8001
        word_feat_dim: 300
train:
    value:
        batch_size: 32
        log_path: ./log
        num_epochs: 30
        optimizer:
            lr: 0.0004
            warmup_init_lr: 1e-07
            warmup_updates: 400
            weight_decay: 0
        save_model: true
        save_path: ./checkpoints/activitynet/exp-activitynet_exp08_2026-06-03_12-26-05
        use_wandb: true
